<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <div class="app-shell">
    <section class="toolbar" aria-label="quick controls">
      <label class="search-wrap" for="site-search">
        <span class="visually-hidden">Search</span>
        <input id="site-search" type="search" placeholder="検索して Enter で最上位を開く" autocomplete="off">
      </label>

      <button id="favorites-toggle" class="toggle-button" type="button" aria-pressed="false">
        FAVORITES ONLY: OFF
      </button>

      <div class="site-count" id="site-count" aria-live="polite">0 / 0</div>
    </section>

    <main>
      <section class="board" aria-live="polite">
        <div id="link-container" class="site-grid"></div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
